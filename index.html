<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TON DNS Releaser</title>

<script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@2.4.4/dist/tonconnect-ui.min.js"></script>
<script src="https://unpkg.com/@ton/core/dist/index.umd.js"></script>

<style>
:root{
    --bg:#060b14;
    --surface:#0d1829;
    --border:#1a2e4a;
    --ton:#0098ea;
    --green:#00d68f;
    --red:#ff4757;
    --text:#e8f4ff;
    --text-dim:#7a9bbf;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial;
    min-height:100vh;
}

.app{
    max-width:480px;
    margin:auto;
    padding:20px;
}

.connect-btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    background:linear-gradient(135deg,#0098ea,#006fa8);
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.connect-btn:disabled{
    opacity:.5;
}

.form-group{
    margin-top:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--surface);
    color:white;
    margin-top:8px;
}

.wallet{
    margin-top:20px;
    padding:14px;
    border:1px solid var(--border);
    border-radius:12px;
    background:var(--surface);
    display:none;
}

.wallet.visible{
    display:block;
}

.main{
    display:none;
}

.main.visible{
    display:block;
}

.status{
    margin-top:8px;
    font-size:13px;
}

.success{
    color:var(--green);
}

.error{
    color:var(--red);
}

.debug{
    margin-top:20px;
    padding:14px;
    border-radius:12px;
    background:#111c2e;
    border:1px solid var(--border);
    font-size:12px;
    word-break:break-all;
}

.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#111c2e;
    border:1px solid var(--green);
    padding:14px 20px;
    border-radius:12px;
    display:none;
}

.toast.error{
    border-color:var(--red);
}

.toast.visible{
    display:block;
}
</style>
</head>
<body>

<div class="app">

    <h1>TON DNS Releaser</h1>

    <br>

    <button class="connect-btn" id="connectBtn">
        Connect Wallet
    </button>

    <div class="wallet" id="walletBox"></div>

    <div class="main" id="main">

        <div class="form-group">
            <label>Domain</label>
            <input id="domainInput" placeholder="example.ton"/>
            <div id="status" class="status"></div>
        </div>

        <div class="form-group">
            <label>Amount (TON)</label>
            <input id="amountInput" value="0.5" type="number"/>
        </div>

        <div class="debug" id="debug"></div>

        <br>

        <button class="connect-btn" id="sendBtn">
            Trigger Release
        </button>

    </div>

</div>

<div class="toast" id="toast"></div>

<script>

const MANIFEST_URL =
"https://dns-exipre-recover.vercel.app/tonconnect-manifest.json";

let tonConnectUI;
let resolvedAddress = null;

// INIT

async function init(){

    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: MANIFEST_URL
    });

    document.getElementById("connectBtn").onclick = () => {
        tonConnectUI.openModal();
    };

    document.getElementById("sendBtn").onclick = sendRelease;

    document.getElementById("domainInput").addEventListener("input", debounce(async e => {
        const value = e.target.value.trim();

        if(value.length < 3){
            clearStatus();
            return;
        }

        await resolveDomain(value);

    }, 500));

    tonConnectUI.onStatusChange(wallet => {

        const connected = !!wallet;

        document.getElementById("main")
            .classList.toggle("visible", connected);

        document.getElementById("walletBox")
            .classList.toggle("visible", connected);

        document.getElementById("connectBtn")
            .style.display = connected ? "none" : "";

        if(connected){

            document.getElementById("walletBox").innerHTML =
                `
                Connected:<br><br>
                ${wallet.account.address}
                <br><br>
                <button class="connect-btn" onclick="disconnectWallet()">
                    Disconnect
                </button>
                `;
        }
    });
}

// DNS

async function resolveDomain(domain){

    const status = document.getElementById("status");

    status.className = "status";
    status.innerHTML = "Resolving...";

    try{

        let full = domain.toLowerCase().trim();

        if(!full.endsWith(".ton")){
            full += ".ton";
        }

        const res = await fetch(
            `https://tonapi.io/v2/dns/${encodeURIComponent(full)}`
        );

        if(!res.ok){
            throw new Error("Domain not found");
        }

        const data = await res.json();

        const addr =
            data?.item?.address ||
            data?.address;

        if(!addr){
            throw new Error("No address");
        }

        resolvedAddress = toNonBounceable(addr);

        status.className = "status success";
        status.innerHTML = resolvedAddress;

        updateDebug();

    }catch(e){

        resolvedAddress = null;

        status.className = "status error";
        status.innerHTML = e.message;
    }
}

// PAYLOAD FIX

function buildReleasePayload(){

    const cell = TON_CORE.beginCell()
        .storeUint(0x4ed14b65, 32)
        .storeUint(0, 64)
        .endCell();

    const boc = cell.toBoc();

    let binary = '';

    const bytes = new Uint8Array(boc);

    for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
    }

    const payload = btoa(binary);

    console.log("VALID PAYLOAD:", payload);

    return payload;
}

// SEND

async function sendRelease(){

    try{

        if(!tonConnectUI.wallet){
            return toast("Connect wallet first", true);
        }

        if(!resolvedAddress){
            return toast("Resolve domain first", true);
        }

        const amount =
            parseFloat(
                document.getElementById("amountInput").value
            );

        if(amount < 0.5){
            return toast("Minimum 0.5 TON", true);
        }

        const nano =
            BigInt(
                Math.floor(amount * 1e9)
            ).toString();

        const payload = buildReleasePayload();

        const tx = {

            validUntil:
                Math.floor(Date.now()/1000) + 300,

            messages:[{
                address: resolvedAddress,
                amount: nano,
                payload: payload
            }]
        };

        console.log(tx);

        await tonConnectUI.sendTransaction(tx);

        toast("Transaction sent");

    }catch(err){

        console.error(err);

        toast(
            err?.message || "Transaction failed",
            true
        );
    }
}

// NON BOUNCEABLE

function toNonBounceable(address){

    try{

        return TON_CORE.Address
            .parse(address)
            .toString({
                bounceable:false
            });

    }catch(e){

        return address;
    }
}

// DEBUG

function updateDebug(){

    document.getElementById("debug").innerHTML =
        `
        Destination:<br><br>
        ${resolvedAddress}
        <br><br>
        Payload:<br><br>
        ${buildReleasePayload()}
        `;
}

// UTILS

function debounce(fn, ms){

    let timer;

    return (...args) => {

        clearTimeout(timer);

        timer = setTimeout(() => {
            fn(...args);
        }, ms);
    };
}

function clearStatus(){

    resolvedAddress = null;

    document.getElementById("status").innerHTML = "";

    document.getElementById("debug").innerHTML = "";
}

function toast(msg, error=false){

    const t = document.getElementById("toast");

    t.innerHTML = msg;

    t.className =
        "toast visible" +
        (error ? " error" : "");

    setTimeout(() => {
        t.classList.remove("visible");
    }, 4000);
}

function disconnectWallet(){
    tonConnectUI.disconnect();
}

window.addEventListener("DOMContentLoaded", init);

</script>

</body>
</html>
