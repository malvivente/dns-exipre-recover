<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>TON DNS Releaser</title>

<!-- Unica libreria necessaria: TON Connect UI ufficiale -->
<script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@2.4.4/dist/tonconnect-ui.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg: #060b14;
    --surface: #0d1829;
    --border: #1a2e4a;
    --ton: #0098ea;
    --green: #00d68f;
    --red: #ff4757;
    --yellow: #ffd32a;
    --text: #e8f4ff;
    --text-dim: #7a9bbf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 20px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
  .logo-icon { width: 44px; height: 44px; background: var(--ton); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: #fff; }
  
  .connect-btn {
    background: linear-gradient(135deg, #0098ea, #006fa8);
    border: none; border-radius: 12px; padding: 14px 24px; color: #fff;
    font-weight: 700; cursor: pointer; width: 100%; font-size: 17px; transition: opacity 0.2s;
  }
  .connect-btn:hover { opacity: 0.9; }
  .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .wallet-pill { display: none; align-items: center; gap: 10px; background: #0d1829; border: 1px solid var(--border); border-radius: 12px; padding: 10px 16px; cursor: pointer; }
  .wallet-pill.visible { display: flex; }
  .main-form { display: none; }
  .main-form.visible { display: block; }

  .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .form-group label { color: var(--text-dim); font-size: 14px; font-weight: 500; }
  .form-group input { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); font-family: inherit; font-size: 16px; outline: none; transition: border-color 0.2s; }
  .form-group input:focus { border-color: var(--ton); }

  .dns-status { font-size: 12px; margin-top: 4px; word-break: break-all; min-height: 18px; }
  .dns-status.loading { color: var(--text-dim); }
  .dns-status.success { color: var(--green); }
  .dns-status.error { color: var(--red); }

  .info-box { background: rgba(255, 211, 42, .05); border: 1px solid rgba(255, 211, 42, .2); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 11px; color: var(--yellow); line-height: 1.6; }
  .debug-box { background: #0d1829; border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 16px; font-size: 11px; color: var(--text-dim); line-height: 1.8; display: none; }
  .debug-box.visible { display: block; }
  .debug-box .key { color: var(--ton); }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-60px); background: #0d1829; border: 1px solid var(--green); padding: 14px 20px; border-radius: 12px; z-index: 9999; color: var(--green); transition: transform .3s cubic-bezier(.34, 1.56, .64, 1); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255, 255, 255, .3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-icon">⬡</div>
    <h1>TON DNS Releaser</h1>
    <div style="margin-left: auto">
      <button id="connectBtn" class="connect-btn" style="padding: 10px 18px; font-size: 14px">Connect</button>
      <div class="wallet-pill" id="walletPill" onclick="disconnectWallet()">
        <span id="walletAddr">...</span>
      </div>
    </div>
  </header>

  <div id="connectGate">
    <p style="text-align: center; color: var(--text-dim); margin: 30px 0">Collega il wallet per continuare</p>
    <button id="bigConnectBtn" class="connect-btn">Connect Wallet →</button>
  </div>

  <div class="main-form" id="mainForm">
    <div class="info-box">
      ⚠️ <strong>DNS Release:</strong> Invia l'operazione strutturata <code>0x4ed14b65</code> direttamente all'indirizzo del contratto del dominio scaduto per forzare il rilascio.
    </div>

    <div class="form-group">
      <label for="domainInput">Dominio TON Scaduto</label>
      <input type="text" id="domainInput" placeholder="esempio.ton" autocomplete="off">
      <div id="dnsStatus" class="dns-status"></div>
    </div>

    <div class="debug-box" id="debugBox">
      <div><span class="key">Contratto Dominio:</span> <span id="dbAddr">—</span></div>
      <div><span class="key">Op-Code:</span> <span>0x4ed14b65 (dns_balance_release)</span></div>
    </div>

    <div class="form-group">
      <label for="amountInput">Importo (TON - Minimo per offerta iniziale asta)</label>
      <input type="number" id="amountInput" placeholder="0.5" step="0.1" min="0.5" value="0.5">
    </div>

    <button id="releaseBtn" class="connect-btn" style="margin-top: 10px">Trigger Release →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MANIFEST_URL = "https://dns-exipre-recover.vercel.app/tonconnect-manifest.json";

let tonConnectUI = null;
let resolvedAddress = null;
let debounceTimer = null;

// ─────────────────────────────────────────────────────────────
// PAYLOAD GENERATO IN PURO JAVASCRIPT NATIVO (Zero Librerie!)
// ─────────────────────────────────────────────────────────────
function buildReleasePayload() {
  /**
   * Genera la struttura BOC esatta per un messaggio interno TON con:
   * - op: 0x4ed14b65 (32 bit)
   * - query_id: 0 (64 bit)
   */
  const bocBytes = new Uint8Array([
    0xb5, 0xee, 0x9c, 0x72, 0x01, 0x01, 0x01, 0x01, 
    0x00, 0x10, 0x00, 0x00, 0x02, 0x4e, 0xd1, 0x4b, 
    0x65, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
    0x00
  ]);

  // Conversione sicura in stringa binaria per btoa (Base64)
  let binary = "";
  for (let i = 0; i < bocBytes.length; i++) {
    binary += String.fromCharCode(bocBytes[i]);
  }
  return btoa(binary);
}

// ─────────────────────────────────────────────────────────────
// CONVERSIONE INDIRIZZI IN FORMATO FRIENDLY (NATIVA)
// ─────────────────────────────────────────────────────────────
function crc16(data) {
  let crc = 0;
  for (const byte of data) {
    crc ^= byte << 8;
    for (let i = 0; i < 8; i++) {
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) & 0xffff : (crc << 1) & 0xffff;
    }
  }
  return crc;
}

function convertRawToFriendly(rawAddress) {
  if (!rawAddress.includes(':')) return rawAddress;
  
  const [wcStr, hexHash] = rawAddress.split(':');
  const wc = parseInt(wcStr);
  const hashBytes = new Uint8Array(hexHash.match(/.{2}/g).map(h => parseInt(h, 16)));
  
  const buffer = new Uint8Array(36);
  buffer[0] = 0x11; // Bounceable friendly format
  buffer[1] = wc & 0xff;
  buffer.set(hashBytes, 2);
  
  const crc = crc16(buffer.slice(0, 34));
  buffer[34] = (crc >> 8) & 0xff;
  buffer[35] = crc & 0xff;
  
  let binary = "";
  for (let i = 0; i < buffer.length; i++) {
    binary += String.fromCharCode(buffer[i]);
  }
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_');
}

// ─────────────────────────────────────────────────────────────
// RISOLUZIONE DOMINIO VIA API
// ─────────────────────────────────────────────────────────────
async function resolveDomain(domain) {
  const statusEl = document.getElementById("dnsStatus");
  statusEl.className = "dns-status loading";
  statusEl.textContent = "⏳ Risoluzione contratto...";
  resolvedAddress = null;
  document.getElementById("debugBox").classList.remove("visible");

  let full = domain.toLowerCase().trim();
  if (!full.endsWith('.ton')) full += '.ton';

  try {
    const res = await fetch(`https://tonapi.io/v2/dns/${encodeURIComponent(full)}`);
    if (res.status === 404) throw new Error("Dominio non registrato/trovato");
    if (!res.ok) throw new Error("Errore di rete API");

    const data = await res.json();
    const raw = data?.item?.address || data?.address;
    if (!raw) throw new Error("Impossibile trovare l'indirizzo del contratto");

    resolvedAddress = convertRawToFriendly(raw);

    statusEl.className = "dns-status success";
    statusEl.textContent = `✓ Contratto trovato: ${resolvedAddress.slice(0, 10)}…${resolvedAddress.slice(-8)}`;
    
    document.getElementById("dbAddr").textContent = resolvedAddress;
    document.getElementById("debugBox").classList.add("visible");
  } catch (e) {
    statusEl.className = "dns-status error";
    statusEl.textContent = `✗ ${e.message}`;
  }
}

// ─────────────────────────────────────────────────────────────
// ESECUZIONE TRANSAZIONE
// ─────────────────────────────────────────────────────────────
async function handleRelease() {
  const amountStr = document.getElementById("amountInput").value.trim();

  if (!resolvedAddress) return showToast("Inserisci e risolvi un dominio valido", true);
  if (!amountStr || parseFloat(amountStr) < 0.5) return showToast("Il minimo richiesto è 0.5 TON", true);
  if (!tonConnectUI?.wallet) return showToast("Connetti prima il tuo Wallet", true);

  const btn = document.getElementById("releaseBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Invio richiesta in corso...';

  try {
    // Calcolo dei NanoTON (valore * 10^9) in formato stringa
    const nano = BigInt(Math.round(parseFloat(amountStr) * 1e9)).toString();

    const tx = {
      validUntil: Math.floor(Date.now() / 1000) + 300,
      messages: [{
        address: resolvedAddress, // Destinatario: il contratto stesso del dominio
        amount: nano,
        payload: buildReleasePayload() // Payload binario statico nativo
      }]
    };

    await tonConnectUI.sendTransaction(tx);
    showToast("✅ Transazione inviata! Se il dominio è scaduto da > 1 anno, l'asta è aperta.");
    document.getElementById("domainInput").value = "";
    clearDnsStatus();
  } catch (err) {
    console.error(err);
    const msg = String(err.message || err);
    showToast(/reject|cancel|declined/i.test(msg) ? "Transazione rifiutata dal wallet" : "Errore: " + msg.slice(0, 80), true);
  } finally {
    btn.disabled = false;
    btn.textContent = "Trigger Release →";
  }
}

function clearDnsStatus() {
  document.getElementById("dnsStatus").textContent = "";
  document.getElementById("debugBox").classList.remove("visible");
  resolvedAddress = null;
}

// ─────────────────────────────────────────────────────────────
// INIZIALIZZAZIONE APPLICAZIONE
// ─────────────────────────────────────────────────────────────
async function init() {
  tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: MANIFEST_URL
  });

  document.getElementById("connectBtn").onclick = () => tonConnectUI.openModal();
  document.getElementById("bigConnectBtn").onclick = () => tonConnectUI.openModal();
  document.getElementById("releaseBtn").onclick = handleRelease;

  document.getElementById("domainInput").oninput = e => {
    clearTimeout(debounceTimer);
    const v = e.target.value.trim();
    if (v.length > 3) {
      debounceTimer = setTimeout(() => resolveDomain(v), 600);
    } else {
      clearDnsStatus();
    }
  };

  tonConnectUI.onStatusChange(w => {
    const connected = !!w;
    document.getElementById("walletPill").classList.toggle("visible", connected);
    document.getElementById("connectBtn").style.display = connected ? "none" : "";
    document.getElementById("connectGate").style.display = connected ? "none" : "";
    document.getElementById("mainForm").classList.toggle("visible", connected);

    if (connected) {
      const rawAddr = w.account.address;
      const friendly = convertRawToFriendly(rawAddr);
      document.getElementById("walletAddr").textContent = friendly.slice(0, 6) + "…" + friendly.slice(-4);
    }
  });
}

function showToast(msg, error = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (error ? " error" : "") + " show";
  setTimeout(() => t.classList.remove("show"), 5000);
}

window.disconnectWallet = () => tonConnectUI?.disconnect();
window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
