<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TON DNS Releaser</title>

<script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@2.4.4/dist/tonconnect-ui.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg:#060b14; --surface:#0d1829; --surface2:#111f35;
    --border:#1a2e4a; --ton:#0098ea; --ton-glow:rgba(0,152,234,0.25);
    --ton-dim:#006fa8; --green:#00d68f; --red:#ff4757; --yellow:#ffd32a;
    --text:#e8f4ff; --text-dim:#7a9bbf; --text-muted:#3a5470;
    --mono:'JetBrains Mono',monospace; --display:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden;position:relative}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,152,234,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,152,234,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:20px 16px 40px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
  .logo-icon{width:40px;height:40px;background:var(--ton);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:18px;color:#fff;box-shadow:0 0 20px var(--ton-glow)}
  .header-text h1{font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:-.3px}
  .wallet-area{margin-left:auto}
  .tc-connect-btn{background:linear-gradient(135deg,#0098ea,#006fa8);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-weight:600;cursor:pointer;box-shadow:0 0 15px var(--ton-glow)}
  .wallet-pill{display:none;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;cursor:pointer}
  .wallet-pill.visible{display:flex}
  .wallet-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:ping 2s infinite}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(0,214,143,.5)}70%{box-shadow:0 0 0 8px rgba(0,214,143,0)}100%{box-shadow:0 0 0 0 rgba(0,214,143,0)}}
  .main-form{display:none}
  .main-form.visible{display:block}
  .connect-gate.visible{display:block}
  .release-btn{width:100%;padding:18px;background:linear-gradient(135deg,#0098ea,#006fa8);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-top:10px}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--green);padding:14px 20px;border-radius:12px;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,214,143,.3);display:none}
  .toast.show{display:block}
  .toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-icon">⬡</div>
    <div class="header-text">
      <h1>TON DNS Releaser</h1>
      <p>dns_balance_release</p>
    </div>
    <div class="wallet-area">
      <button class="tc-connect-btn" id="connectBtn">Connect Wallet</button>
      <div class="wallet-pill" id="walletPill" onclick="disconnectWallet()">
        <div class="wallet-dot"></div>
        <span id="walletAddr">...</span>
      </div>
    </div>
  </header>

  <div class="connect-gate" id="connectGate">
    <h2>Collega il tuo wallet</h2>
    <p>Usa Tonkeeper, Tonhub o altra wallet TON per continuare.</p>
    <button class="release-btn" id="bigConnectBtn">Connect Wallet →</button>
  </div>

  <div class="main-form" id="mainForm">
    <!-- Il tuo form qui (domain, amount, ecc.) -->
    <button class="release-btn" id="releaseBtn">Trigger Release →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== CONFIG ====================
const DNS_ROOT = "EQC3dNlesgVD8YbAazcauaZz-lz0-8beV9oJFnna0GvYcSRE";

let tonConnectUI = null;

// Manifest (obbligatorio)
const manifest = {
  url: window.location.href.split("?")[0].split("#")[0],
  name: "TON DNS Releaser",
  iconUrl: "https://images.seeklogo.com/logo-png/44/1/toncoin-ton-logo-png_seeklogo-440335.png"
};

// ==================== INIT ====================
async function init() {
  try {
    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: `data:application/json,${encodeURIComponent(JSON.stringify(manifest))}`,
      // buttonRootId non serve più
    });

    tonConnectUI.onStatusChange((wallet) => {
      if (wallet) {
        const addr = wallet.account.address;
        const short = addr.length > 10 ? addr.slice(0,6) + "..." + addr.slice(-4) : addr;
        document.getElementById("walletAddr").textContent = short;
        document.getElementById("walletPill").classList.add("visible");
        document.getElementById("connectBtn").style.display = "none";
        document.getElementById("connectGate").classList.remove("visible");
        document.getElementById("mainForm").classList.add("visible");
        showToast("Wallet connesso con successo!", false);
      } else {
        document.getElementById("walletPill").classList.remove("visible");
        document.getElementById("connectBtn").style.display = "block";
        document.getElementById("connectGate").classList.add("visible");
        document.getElementById("mainForm").classList.remove("visible");
      }
    });

    // Pulsanti connect
    document.getElementById("connectBtn").onclick = () => tonConnectUI.openModal();
    document.getElementById("bigConnectBtn").onclick = () => tonConnectUI.openModal();
    document.getElementById("releaseBtn").onclick = () => alert("Aggiungi qui la logica di openModal()");

  } catch (e) {
    console.error(e);
    showToast("Errore di inizializzazione TonConnect", true);
  }
}

function showToast(msg, isError = false) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = isError ? "toast error show" : "toast show";
  setTimeout(() => toast.classList.remove("show"), 4000);
}

window.disconnectWallet = async () => {
  if (tonConnectUI) await tonConnectUI.disconnect();
};

// Avvia tutto
window.onload = init;
</script>
</body>
</html>
